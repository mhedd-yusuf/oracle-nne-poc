# Oracle connection settings
db.url=jdbc:oracle:thin:@//localhost:1521/FREEPDB1
db.user=appuser
db.password=AppUser123

# ============================================================
# Native Network Encryption (NNE) - Client Configuration
# ============================================================
# Must match or be compatible with server's sqlnet.ora settings.
# Both sides set to REQUIRED -> encryption is enforced end-to-end.
#
# Valid values: REQUIRED | REQUESTED | ACCEPTED | REJECTED
nne.encryption.client=REQUIRED
nne.encryption.types=(AES256)

nne.checksum.client=REQUIRED
nne.checksum.types=(SHA256)
