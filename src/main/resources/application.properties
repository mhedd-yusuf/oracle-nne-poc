# Oracle connection
spring.datasource.host=localhost
spring.datasource.port=1521
spring.datasource.service=FREEPDB1
spring.datasource.username=appuser
spring.datasource.password=AppUser123

# NNE client settings embedded directly in the TNS descriptor URL by DataSourceConfig.
# Valid values: REQUIRED | REQUESTED | ACCEPTED | REJECTED
nne.encryption.client=REJECTED
nne.encryption.types=(AES256)
nne.checksum.client=REJECTED
nne.checksum.types=(SHA256)

# Application name shown in V$SESSION.PROGRAM to identify this connection
app.name=oracle-nne-poc

# Spring Boot output
spring.main.banner-mode=off
logging.level.root=WARN
