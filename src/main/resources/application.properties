# Oracle connection
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/FREEPDB1
spring.datasource.username=appuser
spring.datasource.password=AppUser123

# Native Network Encryption (NNE) client settings
# These are read by DataSourceConfig and passed to OracleDataSource as
# connection properties.  The Oracle Thin driver negotiates NNE during the
# TNS handshake using these values.
#
# Valid values: REQUIRED | REQUESTED | ACCEPTED | REJECTED
nne.encryption.client=REQUIRED
#nne.encryption.client=REJECTED
nne.encryption.types=(AES256)

nne.checksum.client=REQUIRED
#nne.checksum.client=REJECTED
nne.checksum.types=(SHA256)

# Spring Boot output
spring.main.banner-mode=off
logging.level.root=WARN
